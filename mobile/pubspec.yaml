name: trolley_scout
description: Find grocery deals, compare store prices, and search properties.
publish_to: 'none'
version: 1.9.4+25

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^13.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.4
  app_links: ^6.4.1
  web: ^1.1.1
  webview_flutter: ^4.13.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^17.2.4
  audioplayers: ^6.1.0
  local_auth: ^2.3.0
  in_app_update: ^4.2.5
  workmanager: ^0.9.0+3
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/scout-logo.png
    - assets/mascots/
    - assets/onboarding/
    - assets/intro/
    - assets/sounds/tap.wav
    - assets/sounds/success.wav
    - assets/sounds/deal_alert.wav
    - assets/music/groove_funk.mp3
    - assets/music/groove_deuces.mp3
    - assets/music/groove_bossa.mp3
    - assets/music/groove_chunk.mp3
    - assets/music/groove_cool.mp3
    - assets/music/groove_riley.mp3
    - assets/music/groove_shade.mp3
    - assets/music/groove_vibe.mp3
