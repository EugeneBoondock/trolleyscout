name: trolley_scout
description: Stretch every rand with money help, tools, and live grocery deals for South Africa.
publish_to: 'none'
version: 1.6.2+12

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^13.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  web: ^1.1.1
  webview_flutter: ^4.13.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^17.2.4
  audioplayers: ^6.1.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand-mark.png
    - assets/sounds/tap.wav
    - assets/sounds/success.wav
    - assets/sounds/deal_alert.wav
    - assets/music/groove_funk.mp3
    - assets/music/groove_deuces.mp3
    - assets/music/groove_bossa.mp3
    - assets/music/groove_chunk.mp3
    - assets/music/groove_cool.mp3
    - assets/music/groove_riley.mp3
    - assets/music/groove_shade.mp3
    - assets/music/groove_vibe.mp3
