<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/scout-logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Trolley Scout: grocery deals, price comparison and properties</title>
    <meta
      name="description"
      content="Trolley Scout finds grocery specials, compares products across stores, searches nearby retailers, and gathers property listings from multiple platforms."
    />
    <meta
      name="keywords"
      content="grocery deals, supermarket specials, unit price calculator, Pick n Pay specials, Checkers specials, Shoprite deals, Woolworths specials, cheapest groceries, price comparison, nearby stores, property search"
    />
    <meta name="author" content="Boondock Labs (Pty) Ltd" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="theme-color" content="#1c1710" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Trolley Scout" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://trolleyscout.co.za/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Trolley Scout" />
    <meta property="og:title" content="Trolley Scout: grocery deals, comparisons and properties" />
    <meta
      property="og:description"
      content="Find grocery specials, compare products across stores, browse catalogues, and search property platforms in one place."
    />
    <meta property="og:image" content="https://trolleyscout.co.za/assets/og-card.png" />
    <meta property="og:image:secure_url" content="https://trolleyscout.co.za/assets/og-card.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Trolley Scout grocery deals and price comparison" />
    <meta property="og:url" content="https://trolleyscout.co.za/" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trolley Scout: grocery deals, comparisons and properties" />
    <meta
      name="twitter:description"
      content="Find grocery specials, compare products across stores, browse catalogues, and search property platforms in one place."
    />
    <meta name="twitter:image" content="https://trolleyscout.co.za/assets/og-card.png" />
    <meta name="twitter:image:alt" content="Trolley Scout grocery deals and price comparison" />

    <!-- Agent & machine-readable entry points -->
    <link rel="alternate" type="text/markdown" href="/index.md" />
    <link rel="api-catalog" href="/.well-known/api-catalog" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://trolleyscout.co.za/#organization",
            "name": "Trolley Scout",
            "url": "https://trolleyscout.co.za/",
            "logo": "https://trolleyscout.co.za/assets/scout-logo.png",
            "description": "Grocery deals, store comparisons, nearby retailers, and property search.",
            "areaServed": { "@type": "Country", "name": "South Africa" },
            "parentOrganization": {
              "@type": "Organization",
              "name": "Boondock Labs (Pty) Ltd",
              "url": "https://boondocklabs.co.za"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://trolleyscout.co.za/#website",
            "url": "https://trolleyscout.co.za/",
            "name": "Trolley Scout",
            "inLanguage": "en-ZA",
            "publisher": { "@id": "https://trolleyscout.co.za/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://trolleyscout.co.za/deals?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "MobileApplication",
            "name": "Trolley Scout",
            "operatingSystem": "ANDROID",
            "applicationCategory": "ShoppingApplication",
            "url": "https://trolleyscout.co.za/",
            "downloadUrl": "https://github.com/EugeneBoondock/trolleyscout/releases/latest",
            "inLanguage": "en-ZA",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "ZAR" },
            "publisher": { "@id": "https://trolleyscout.co.za/#organization" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
