<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Trolley Scout — grocery deals & money help for South Africa</title>

      name="description"
      content="Trolley Scout helps South Africans stretch every rand: this week's grocery specials from official retailer pages, a store-by-store price comparison, an aisle unit-price checker, and money help like SASSA grant amounts, school-fee exemptions and free basic electricity — all free."
    />
    <meta
      name="keywords"
      content="grocery deals South Africa, supermarket specials, SASSA grants 2026, school fee exemption, free basic electricity, unit price calculator, Pick n Pay specials, Checkers specials, Shoprite deals, Woolworths specials, cheapest groceries, price comparison, OneDayOnly, Hyperli, save money South Africa"
    />
    <meta name="author" content="Boondock Labs (Pty) Ltd" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="theme-color" content="#1c1710" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Trolley Scout" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://trolleyscout.co.za/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Trolley Scout" />
    <meta property="og:title" content="Trolley Scout — grocery deals & money help for South Africa" />

      property="og:description"
      content="This week's grocery specials from official SA retailer pages, a cheapest-store price comparison, an offline unit-price checker, and money help like SASSA grants and free basic electricity. Free."

      name="twitter:description"
      content="This week's grocery specials, a cheapest-store price comparison, an aisle unit-price checker, and SASSA / free-electricity money help. Free."

    <!-- Agent & machine-readable entry points -->
    <link rel="alternate" type="text/markdown" href="/index.md" />
    <link rel="api-catalog" href="/.well-known/api-catalog" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://trolleyscout.co.za/#organization",
            "name": "Trolley Scout",
            "url": "https://trolleyscout.co.za/",
            "logo": "https://trolleyscout.co.za/assets/brand-mark.png",

              "@type": "Organization",
              "name": "Boondock Labs (Pty) Ltd",
              "url": "https://boondocklabs.co.za"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://trolleyscout.co.za/#website",

            "inLanguage": "en-ZA",

              "@type": "SearchAction",
              "target": {
